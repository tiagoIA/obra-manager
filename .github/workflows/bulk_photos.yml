name: Bulk Material Photos
on:
  workflow_dispatch:
    inputs:
      limit:
        description: 'Quantos processar (0=todos)'
        default: '0'
jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install firebase-admin requests
      - name: Create service account key
        env:
          FIREBASE_SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: echo "$FIREBASE_SA" > serviceAccountKey.json
      - name: Run bulk photo upload
        run: python3 scripts/bulk_photos.py
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_CX: ${{ secrets.GOOGLE_CX }}
          LIMIT: ${{ inputs.limit }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: log
          path: log.json
